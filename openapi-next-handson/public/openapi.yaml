openapi: 3.0.0 # バージョン指定
info:
  title: Sample API # APIのタイトル
  version: 1.0.0 # バージョン情報

paths: # エンドポイント定義の開始
  /api/users: # エンドポイントのパス
    get: # HTTPメソッド post put deleteも書ける
      summary: ユーザー一覧の取得 # エンドポイントの説明
      description: すべてのユーザー情報を取得します。 # 詳細説明
      responses: # レスポンス定義の開始
        '200': # httpステータスコード200 ok
          description: 成功 # レスポンスの説明
          content: # レスポンスのコンテンツタイプ
            application/json: # JSON形式のレスポンス。このAPIは JSON を返す、という宣言
              schema: #返却されるjsonの構造定義 ここから肩の話
                type: object # レスポンス全チアはオブジェクト型
                properties: #オブジェクトが持つプロパティの定義
                  users: # resuponseオブジェクトの中にあるキーusers { "users": [...] } の定義
                    type: array # usersは配列である
                    items: #配列の 中身の型定義
                      type: object #配列の1要素はオブジェクト型
                      properties: #ユーザーオブジェクトのプロパティ定義
                        id: #ユーザーID
                          type: number #数値型
                        name: #ユーザー名
                          type: string #文字列型
                        email: #メールアドレス
                          type: string #文字列型
  /api/users/{id}: # ユーザーIDを含むパス
    put: # HTTP PUT メソッド
      summary: ユーザー情報の更新
      description: 指定したユーザーの情報を更新します。

      # どのユーザーか定義
      parameters: # パス・クエリパラメータ定義
        - name: id # パラメータ名
          in: path # URLパス内のパラメータ  /api/users/4
          required: true # 必須 parametersは必須
          schema:
            type: number # ユーザーIDは数値

      # 何に更新するか
      requestBody: # リクエストボディ定義（PUTで重要）
        required: true # 必須 k城慎吾の状態を送る
        content: #requestBodyの中身
          application/json: # JSONで送る
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
      # 更新後に何を返すか
      responses:
        '200':
          description: 更新成功 #正常に更新できた場合
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type:number:
                  name:
                    type: string
                  email:
                    type: string
        '400':
          description: リクエスト不正
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  errors:
                    type: array
                    items:
                      type: string
        '404':
          description: ユーザーが存在しない
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '500':
          description: サーバー内部エラー
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

# レスポンス構造を 文章ではなく型で定義することで、API利用者がレスポンスの内容を理解しやすくなる。
